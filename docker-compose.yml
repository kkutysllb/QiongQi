services:
  qiongqi:
    build: .
    ports:
      - "8899:8899"
    environment:
      QIONGQI_BASE_URL: ${QIONGQI_BASE_URL}
      QIONGQI_API_KEY: ${QIONGQI_API_KEY}
      QIONGQI_RUNTIME_TOKEN: ${QIONGQI_RUNTIME_TOKEN}
    volumes:
      - qiongqi-data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8899/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  qiongqi-data:
